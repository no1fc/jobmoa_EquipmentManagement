server:
  port: 9080
  servlet:
    encoding:
      charset: UTF-8
      force: true

spring:
  application:
    name: jobmoa-equipment-management

  datasource:
    url: ${DB_URL:jdbc:sqlserver://localhost:1433;databaseName=jobmoa_equipment;encrypt=true;trustServerCertificate=true}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.SQLServerDialect
        format_sql: true
    show-sql: false
    open-in-view: false

  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

jwt:
  secret: ${JWT_SECRET}
  access-expiration: 1800000
  refresh-expiration: 604800000

file:
  upload-dir: ${FILE_UPLOAD_DIR:./uploads}
  allowed-extensions: jpg,jpeg,png,webp
  max-size: 10485760

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

logging:
  level:
    root: INFO
    com.jobmoa.equipment: DEBUG
